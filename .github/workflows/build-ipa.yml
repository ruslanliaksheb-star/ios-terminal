name: Build terminal IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          set -euxo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Debug workspace
        run: |
          set -euxo pipefail
          pwd
          ls -la
          ls -la terminal-ios

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
        working-directory: terminal-ios

      - name: Build unsigned app for iPhoneOS
        run: |
          set -euxo pipefail
          xcodebuild -list -project terminal.xcodeproj
          xcodebuild \
            -project terminal.xcodeproj \
            -scheme terminal \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
        working-directory: terminal-ios

      - name: Package unsigned IPA
        run: |
          set -euxo pipefail
          APP_PATH="build/Release-iphoneos/terminal.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -type d -path "*/Build/Products/Release-iphoneos/terminal.app" | head -n1)"
          fi
          test -d "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r terminal-unsigned.ipa Payload
        working-directory: terminal-ios

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-unsigned-ipa
          path: terminal-ios/terminal-unsigned.ipa
